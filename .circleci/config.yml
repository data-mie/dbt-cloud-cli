version: 2.1

# Pipeline parameters let us trigger the integration workflow on demand
# via the CircleCI API without affecting normal CI runs.
parameters:
  run-integration-tests:
    type: boolean
    default: false

jobs:
  unit-tests:
    docker:
      - image: cimg/python:3.12

    resource_class: small

    steps:
      - checkout
      - run:
          name: Install Python packages
          command: |
            pip install --upgrade pip setuptools
            pip install -e .[test,lint]
            sudo apt-get update -yqq
            sudo apt-get install jq -yqq

      - run:
          name: Lint Python
          command: black --check .

      - run:
          name: Run unit tests
          command: pytest tests/test_command.py tests/test_job.py tests/test_cli.py tests/test_tools.py

  integration-tests:
    docker:
      - image: cimg/python:3.12

    resource_class: small

    environment:
      DBT_CLOUD_PROJECT_ID: 26597
      DBT_CLOUD_ENVIRONMENT_ID: 49819
      DBT_CLOUD_JOB_ID: 43167

    steps:
      - checkout
      - run:
          name: Install Python packages
          command: |
            pip install --upgrade pip setuptools
            pip install -e .[test]
            sudo apt-get update -yqq
            sudo apt-get install jq -yqq

      - run:
          name: Run integration tests
          command: pytest tests/integration/

      - run:
          name: Test 'dbt-cloud audit-log get'
          command: |
            dbt-cloud audit-log get > audit_logs.json
            cat audit_logs.json | jq '.data[] | {id: .id}'
            log_count=$(cat audit_logs.json | jq '.data | length')
            [[ $log_count > 0 ]] && exit 0 || exit 1

      - run:
          name: Test 'dbt-cloud metadata query'
          command: |
            dbt-cloud metadata query -f tests/data/metadata_query.graphql

workflows:
  # Runs on every push. Drives the README badge — never goes on hold.
  ci:
    jobs:
      - unit-tests

  # Only runs when triggered via the CircleCI API with
  # {"parameters": {"run-integration-tests": true}}.
  # Kept separate so it never blocks the ci workflow or the badge.
  integration:
    when: << pipeline.parameters.run-integration-tests >>
    jobs:
      - approve:
          type: approval
      - integration-tests:
          requires:
            - approve